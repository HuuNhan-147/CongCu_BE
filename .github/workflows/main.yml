name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ============================================================
  # JOB 1: CI - Kiểm tra code (chạy cả PR lẫn push main/develop)
  # ============================================================
  ci:
    name: CI - Install & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # --- Backend ---
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./backend
        run: npm test || echo "⚠️ Không có test backend, bỏ qua"

      # --- Frontend ---
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint || echo "⚠️ Lint warning, tiếp tục"

      - name: Build frontend (kiểm tra compile lỗi)
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api

  # ============================================================
  # JOB 2: CD - Build & Push Docker (chạy khi push lên main hặc develop)
  # ============================================================
  cd:
    name: CD - Build & Push Docker
    runs-on: ubuntu-latest
    needs: ci                        # Chỉ chạy nếu CI pass
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push Backend
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/congcu-backend:${{ github.ref_name == 'main' && 'latest' || 'develop' }}
            ${{ secrets.DOCKER_USERNAME }}/congcu-backend:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Frontend (truyền VITE_API_URL lúc build)
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/congcu-frontend:${{ github.ref_name == 'main' && 'latest' || 'develop' }}
            ${{ secrets.DOCKER_USERNAME }}/congcu-frontend:${{ github.run_number }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


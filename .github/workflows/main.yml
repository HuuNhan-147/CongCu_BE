# =========================
# Tên workflow (hiển thị trên GitHub Actions)
# =========================
name: CI/CD Pipeline

# =========================
# Khi nào pipeline được kích hoạt
# =========================
on:
  push:
    branches:
      - main
      - develop       # Trigger khi push lên 2 nhánh chính
  pull_request:
    branches:
      - main
      - develop       # Trigger khi tạo PR vào 2 nhánh này

jobs:

  # ============================================================
  # JOB 1: CI - Kiểm tra code
  # ============================================================
  ci:
    name: CI - Install & Lint
    runs-on: ubuntu-latest   # Chạy trên máy ảo Ubuntu

    steps:
      # Lấy source code từ repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Cài đặt Node.js + cache npm để tăng tốc
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'       # Dùng Node.js version 20
          cache: 'npm'             # Bật cache npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # =========================
      # Backend
      # =========================
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci               # Cài dependencies (nhanh + chuẩn CI)

      - name: Run backend tests
        working-directory: ./backend
        run: npm test || echo "⚠️ Không có test backend, bỏ qua"
        # Nếu không có test → không fail pipeline

      # =========================
      # Frontend
      # =========================
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint || echo "⚠️ Lint warning, tiếp tục"
        # Có lỗi lint vẫn cho qua (không block CI)

      - name: Build frontend (kiểm tra compile lỗi)
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://congcu-be-backend-2-0.onrender.com/api
        # Build để đảm bảo không có lỗi compile


  # ============================================================
  # JOB 2: CD - Build & Push Docker
  # ============================================================
  cd:
    name: CD - Build & Push Docker
    runs-on: ubuntu-latest
    needs: ci   # Chỉ chạy nếu job CI thành công

    # Điều kiện: chỉ chạy khi push (không chạy khi PR)
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'

    steps:
      # Lấy code
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Đăng nhập Docker Hub
      # =========================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}   # Username lưu trong GitHub Secrets
          password: ${{ secrets.DOCKER_PASSWORD }}   # Password/Token Docker Hub

      # =========================
      # Setup Docker Buildx
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx giúp build multi-platform + cache tốt hơn

      # =========================
      # Build & Push Backend Image
      # =========================
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend     # Thư mục backend
          push: true             # Push lên Docker Hub

          # Tag image:
          # - latest (main)
          # - develop (nhánh develop)
          # - run_number (version theo pipeline)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/congcu-backend:${{ github.ref_name == 'main' && 'latest' || 'develop' }}
            ${{ secrets.DOCKER_USERNAME }}/congcu-backend:${{ github.run_number }}

          # Cache build để tăng tốc
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # Build & Push Frontend Image
      # =========================
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true

          tags: |
            ${{ secrets.DOCKER_USERNAME }}/congcu-frontend:${{ github.ref_name == 'main' && 'latest' || 'develop' }}
            ${{ secrets.DOCKER_USERNAME }}/congcu-frontend:${{ github.run_number }}

          # Truyền biến môi trường vào build (quan trọng với Vite)
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

          cache-from: type=gha
          cache-to: type=gha,mode=max



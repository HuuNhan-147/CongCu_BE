services:

  backend:
    build: ./backend
    container_name: congcu_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: congcu_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
